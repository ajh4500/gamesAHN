<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkers Local</title>
    <link rel="stylesheet" href="../../../css/header.css?v=20260429c">
    <link rel="stylesheet" href="../../../css/auth.css?v=20260429c">
    <link rel="stylesheet" href="../../../css/game-page.css?v=20260429c">
    <style>
        #game-container {
            display: flex;
            justify-content: center;
            width: min(100%, 350px);
        }

        #gameCanvas {
            width: 350px;
            height: 350px;
            border: 2px solid lightskyblue;
            display: block;
        }

        #menu-container {
            display: grid;
            gap: 0.35rem;
            color: lightskyblue;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.9rem;
            text-align: center;
        }

        #turn-message {
            display: none;
        }

        @media (max-width: 720px) {
            #game-container,
            #gameCanvas {
                width: 330px;
            }

            #gameCanvas {
                height: 330px;
            }
        }
    </style>
</head>
<body class="game-page">
    <header>
        <div class="logo" aria-label="GAME AHN">
            <span class="logo-top">AHN</span>
            <span class="logo-main" aria-hidden="true">
                <span class="logo-letter letter-g">G</span>
                <span class="logo-letter letter-a">A</span>
                <span class="logo-letter letter-m">M</span>
                <span class="logo-letter letter-e">E</span>
            </span>
        </div>

        <nav>
            <a href="#" data-auth-action="login">Log in</a>
            <a href="#" data-auth-action="signup">Sign Up</a>
        </nav>
    </header>

    <main class="game-page-layout">
        <section class="game-panel checkers-panel">
            <div class="main-container">
                <div id="game-container">
                    <canvas id="gameCanvas" width="350" height="350"></canvas>
                </div>

                <div class="control">
                    <div class="mode-actions" data-mode-group="checkers" aria-label="Game mode">
                        <a class="mode-button" href="../checkindex.html" data-mode-choice="ai">AI</a>
                        <a class="mode-button" href="./checkindexloc.html" data-mode-choice="local">Local</a>
                    </div>

                    <div id="menu-container">
                        <div id="turn-message"></div>
                        <div>Pieces Player 1: <label id="pieces-player1"></label></div>
                        <div>Pieces Player 2: <label id="pieces-player2"></label></div>
                    </div>

                    <div class="ingame" id="won">You won !</div>
                    <div class="ingame" id="lost">You lost !</div>
                    <div class="ingame" id="draw">It's a Draw</div>

                    <div class="end-actions">
                        <a class="game-action-button" href="../../../../index.html">Home</a>
                        <button class="game-action-button restart-button" type="button">Restart</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <aside class="page-side-games">
        <h2 class="side-games-title">More Games</h2>
        <div class="side-games-grid">
            <a class="side-game-card" href="../../tictactoe/tictacindex.html">
                <span class="side-game-name">Tic-Tac-Toe</span>
                <span class="side-game-status">Ready to play</span>
            </a>
            <a class="side-game-card" href="../../connect4/c4index.html">
                <span class="side-game-name">Connect-4</span>
                <span class="side-game-status">Ready to play</span>
            </a>
            <a class="side-game-card current" href="../checkindex.html">
                <span class="side-game-name">Checkers</span>
                <span class="side-game-status">Playing now</span>
            </a>
            <a class="side-game-card" href="../../soltaire/solindex.html">
                <span class="side-game-name">Solitaire</span>
                <span class="side-game-status">Ready to play</span>
            </a>
        </div>
    </aside>

    <script src="script.js?v=20260429c"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var prompt = document.querySelector("[data-mode-group]");
            if (!prompt) return;

            function showPrompt() {
                prompt.classList.remove("is-hidden");
                prompt.style.opacity = "";
                prompt.style.transition = "";
            }

            prompt.addEventListener("click", function (event) {
                var link = event.target.closest("[data-mode-choice]");
                if (!link) return;

                event.preventDefault();
                prompt.style.transition = "opacity 160ms ease";
                prompt.style.opacity = "0";

                window.setTimeout(function () {
                    var targetUrl = new URL(link.getAttribute("href"), window.location.href).href.split("#")[0];
                    var currentUrl = window.location.href.split("#")[0];
                    if (targetUrl === currentUrl) {
                        prompt.classList.add("is-hidden");
                    } else {
                        window.location.href = link.href;
                    }
                }, 170);
            });

            document.addEventListener("click", function (event) {
                if (event.target.closest(".restart-button")) showPrompt();
            }, true);

            new MutationObserver(function () {
                if (document.querySelector(".ingame[style*='block']")) showPrompt();
            }).observe(document.body, { attributes: true, attributeFilter: ["style"], subtree: true });
        });
    </script>
    <script src="../../../js/game-page.js?v=20260429c"></script>
    <script src="../../../js/config.js?v=20260429c"></script>
    <script src="../../../js/auth.js?v=20260429c"></script>
</body>
</html>
